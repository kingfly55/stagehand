name: Validate Runners

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    paths:
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: centergram-arc-runners
    steps:
      - uses: actions/checkout@v4
      - name: Check for GitHub-hosted runners
        shell: bash
        run: |
          set +e
          HITS=$(grep -rHnE '^\s*runs-on:.*(ubuntu-(latest|[0-9]+\.[0-9]+|[0-9]+)|windows-(latest|[0-9]{4}|[0-9]+)|macos-(latest|[0-9]+))' .github/workflows/ || true)
          if [ -n "$HITS" ]; then
            echo "::error::Workflow validation failed — GitHub-hosted runners are not allowed in this org."
            echo "::error::Switch 'runs-on:' to 'centergram-arc-runners' in the following locations:"
            while IFS= read -r line; do
              echo "::error::  $line"
            done <<< "$HITS"
            echo ""
            echo "::error::All CenterGram workflows must run on the self-hosted ARC runner."
            exit 1
          fi
          echo "OK — no GitHub-hosted runners found in .github/workflows/"
